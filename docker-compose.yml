services:
  db:
    image: postgres:16
    container_name: postgres_cinema
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h 127.0.0.1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    volumes:
      - ./src:/app/src
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog_cinema
    ports:
      - "1025:1025"
      - "8025:8025"
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    command: >
      celery -A src.celery_app worker --loglevel=info
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  celery-beat:
    restart: on-failure
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    command: >
      celery -A src.celery_app beat --loglevel=info
    environment:
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

volumes:
  postgres_data: