<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Reaction on Your Comment</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f8f9fa; font-family: 'Segoe UI', Arial, sans-serif; -webkit-font-smoothing: antialiased;">
<table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #f8f9fa; padding: 20px 0;">
  <tr>
    <td>
      <div style="border: 1px solid #e9ecef; border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
                  padding: 32px; max-width: 480px; width: 100%; margin: 20px auto; background-color: #ffffff; color: #333333; box-sizing: border-box;">

        <div style="font-size: 40px; margin-bottom: 20px; text-align: center;">
          {% if reaction_data.reaction_type == 'LIKE' %}👍{% else %}👎{% endif %}
        </div>

        <p style="margin: 0 0 24px 0; line-height: 1.6; font-size: 16px; color: #495057; text-align: center;">
          Someone <strong>{{ reaction_data.reaction_type | lower }}d</strong> your comment on the movie!
        </p>

        <p style="margin: 24px 0; text-align: center;">
          <a id="link" href="{{ comment_link }}" target="_blank"
             style="display: inline-block; background-color: #4CAF50; color: #ffffff; text-decoration: none;
                    font-size: 16px; font-weight: bold; padding: 12px 28px; border-radius: 6px; box-shadow: 0 2px 4px rgba(76, 175, 80, 0.2);">
             View Reaction
          </a>
        </p>

        <hr style="border: 0; border-top: 1px solid #dee2e6; margin: 32px 0 24px 0;">

        <p style="margin: 0 0 4px 0; line-height: 1.4; font-size: 14px; color: #868e96;">
          Regards,
        </p>
        <p style="margin: 0; font-weight: bold; font-size: 16px; color: #4CAF50;">
          Taras Mosiichuk
        </p>
      </div>
    </td>
  </tr>
</table>
</body>
</html>
